name: RavenStore Production Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api-and-bot:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ravenstore
          POSTGRES_PASSWORD: ci-${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB: ravenstore_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ravenstore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://ravenstore:ci-${{ github.run_id }}-${{ github.run_attempt }}@localhost:5432/ravenstore_test
      DATABASE_DIRECT_URL: postgresql+asyncpg://ravenstore:ci-${{ github.run_id }}-${{ github.run_attempt }}@localhost:5432/ravenstore_test
      REDIS_URL: redis://localhost:6379/15
      RUN_INTEGRATION_TESTS: "1"
      JWT_SECRET_KEY: ci-secret-key-must-be-at-least-32-chars-long
      JWT_REFRESH_SECRET_KEY: ci-refresh-secret-key-must-be-at-least-32-chars-long
      API_KEY_PEPPER: ci-api-key-pepper-must-be-at-least-32-chars-long
      ENCRYPTION_KEY: CefXszn9a-6XgC-nLZKZm0uj5fP53s7w_vp9_DiDxb8=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install API
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -e ".[dev]" --quiet
      - name: Migrate database
        working-directory: apps/api
        run: alembic upgrade head
      - name: Validate API
        working-directory: apps/api
        run: |
          ruff check app tests
          pytest -v > pytest_output.log 2>&1 || (cat pytest_output.log | while read line; do echo "::error::$line"; done && exit 1)
          pip install pip-audit
          pip-audit . || true
      - name: Install and validate bot
        working-directory: apps/bot
        run: |
          pip install -e ".[dev]" --quiet
          ruff check raven_bot tests
          pytest -v > pytest_bot_output.log 2>&1 || (cat pytest_bot_output.log | while read line; do echo "::error::$line"; done && exit 1)

  nextjs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [web, storefront]
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_ADMIN_SITE_URL: http://localhost:3020
      NEXT_PUBLIC_SITE_URL: http://localhost:3021
      NEXT_PUBLIC_TELEGRAM_BOT_URL: https://t.me/Ravenn_store_bot
      RAVENSTORE_IMAGE_HOST: tdjfbnbhswipvwjebrbd.supabase.co
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json
      - name: Install
        working-directory: apps/${{ matrix.app }}
        run: npm ci
      - name: Typecheck
        working-directory: apps/${{ matrix.app }}
        run: npm run typecheck
      - name: Production build
        working-directory: apps/${{ matrix.app }}
        run: npm run build > build_output.log 2>&1 || (cat build_output.log | while read line; do echo "::error::$line"; done && exit 1)
      - name: Dependency audit
        working-directory: apps/${{ matrix.app }}
        run: npm audit --omit=dev --audit-level=high || true
